<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Pricing Plans</h1>

    <div class="pricing-container">
        <!-- Basic Plan -->
        <div class="pricing-card basic-plan">
            <h2>Basic</h2>
            <div class="features">
                <ul>
                    <li>1 User</li>
                    <li>10GB Storage</li>
                </ul>
            </div>
            <p>$9/month</p>
        </div>

        <!-- Pro Plan -->
        <div class="pricing-card pro-plan">
            <h2>Pro</h2>
            <div class="features">
                <ul>
                    <li>5 Users</li>
                    <li>50GB Storage</li>
                    <li>Priority Support</li>
                </ul>
            </div>
            <p>$19/month</p>
        </div>

        <!-- Premium Plan -->
        <div class="pricing-card premium-plan">
            <h2>Premium</h2>
            <div class="features">
                <ul>
                    <li>Unlimited Users</li>
                    <li>500GB Storage</li>
                    <li>24/7 Concierge</li>
                </ul>
            </div>
            <p>$29/month</p>
        </div>
    </div>

</body>
</html>
