<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Palindrome Checker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Is it a Palindrome?</h1>
        <p class="description">
            A <strong>palindrome</strong> is a word or phrase that reads the same backward as forward, ignoring casing, punctuation, and spaces.
        </p>
        
        <div class="checker-box">
            <label for="text-input">Enter text to check:</label>
            <input type="text" id="text-input" placeholder="e.g., race car, _eye, 0_0" autocomplete="off" />
            <button id="check-btn">Check</button>
        </div>

        <div id="result" class="result-div hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
