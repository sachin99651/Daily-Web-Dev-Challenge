<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Lightbox Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="gallery">
    <img src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" alt="Stonehenge" class="gallery-item">
    <img src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="Storm" class="gallery-item">
    <img src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" alt="Trees" class="gallery-item">
  </div>

  <div class="lightbox">
    <button id="close-btn">&times;</button>
    <img id="lightbox-image" src="" alt="Full-size Preview">
  </div>

  <script src="script.js"></script>
</body>
</html>
